<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowHub 試算器 URL 生成工具</title>
<style>
  body {
    font-family: 'Microsoft JhengHei', sans-serif;
    background: #f5f0ea;
    padding: 20px;
    color: #4a4240;
  }
  .container {
    max-width: 900px;
    margin: 0 auto;
    background: white;
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 8px 24px rgba(107,87,64,.1);
  }
  h1 {
    color: #8b7355;
    margin-bottom: 30px;
    font-size: 24px;
  }
  .section {
    margin-bottom: 30px;
  }
  .section h2 {
    color: #c9a96e;
    font-size: 16px;
    margin-bottom: 15px;
    border-bottom: 2px solid #f8f2e8;
    padding-bottom: 10px;
  }
  textarea {
    width: 100%;
    height: 200px;
    padding: 12px;
    border: 2px solid #d6ccc0;
    border-radius: 8px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    box-sizing: border-box;
    resize: vertical;
  }
  textarea:focus {
    outline: none;
    border-color: #c9a96e;
    box-shadow: 0 0 0 4px rgba(201,169,110,.15);
  }
  button {
    background: linear-gradient(135deg, #6b5740, #a08968);
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover {
    opacity: 0.9;
  }
  .output-box {
    background: #f8f2e8;
    border: 1px solid #e8e0d6;
    border-radius: 8px;
    padding: 15px;
    margin-top: 15px;
    font-size: 12px;
    font-family: 'Courier New', monospace;
    word-break: break-all;
    max-height: 300px;
    overflow-y: auto;
  }
  .info {
    background: #eef5ee;
    border-left: 4px solid #6a8a6a;
    padding: 15px;
    border-radius: 4px;
    margin-bottom: 15px;
    font-size: 13px;
    color: #3e6e3e;
  }
  .copy-btn {
    background: #c9a96e;
    padding: 8px 16px;
    font-size: 12px;
    margin-left: 10px;
  }
  .copy-btn:hover {
    background: #b8944a;
  }
  .success {
    color: #2e7d32;
    font-weight: 600;
    margin-top: 10px;
  }
  .error {
    color: #c0392b;
    font-weight: 600;
    margin-top: 10px;
  }
  .url-input {
    width: 100%;
    padding: 12px;
    border: 2px solid #d6ccc0;
    border-radius: 8px;
    font-size: 13px;
    box-sizing: border-box;
    font-family: 'Courier New', monospace;
  }
  .url-input:focus {
    outline: none;
    border-color: #c9a96e;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 768px) {
    .grid {
      grid-template-columns: 1fr;
    }
    .container {
      padding: 20px;
    }
  }
</style>
</head>
<body>

<div class="container">
  <h1>🔗 FlowHub 試算器 URL 生成工具</h1>

  <div class="grid">
    <div>
      <div class="section">
        <h2>1. JSON 配置</h2>
        <div class="info">
          貼上店家配置 JSON。請參考 example-config.json 或 USAGE_GUIDE.md
        </div>
        <textarea id="jsonInput" placeholder='{"n": "店家名稱", "f": [...]}'>{"n": "旗艦店 A", "f": []}</textarea>
        <button onclick="generateUrl()">生成 URL ➜</button>
        <div id="jsonError"></div>
      </div>
    </div>

    <div>
      <div class="section">
        <h2>2. Base64 &amp; URL</h2>
        <div class="info">
          自動生成的 Base64 編碼和完整 URL
        </div>
        <textarea id="base64Output" readonly placeholder="Base64 編碼將顯示於此"></textarea>
        <button onclick="copyToClipboard('base64Output')" class="copy-btn">複製 Base64</button>
        <div id="base64Error"></div>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>3. 完整 URL</h2>
    <div class="info">
      修改基礎 URL，然後複製並分享給客戶
    </div>
    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
      <input type="text" id="baseUrl" class="url-input" value="https://yoursite.com/calc.html" placeholder="輸入基礎 URL (例：https://yoursite.com/calc.html)">
      <button onclick="buildFullUrl()">組合</button>
    </div>
    <textarea id="fullUrl" readonly placeholder="完整 URL 將顯示於此" style="height: 100px;"></textarea>
    <button onclick="copyToClipboard('fullUrl')" class="copy-btn">複製 URL</button>
  </div>

  <div class="section">
    <h2>4. 驗證</h2>
    <button onclick="validateAndPreview()">驗證並預覽</button>
    <div id="validateResult"></div>
  </div>

  <div class="section">
    <h2>5. 快速連結</h2>
    <div class="info">
      <strong>測試連結：</strong><br>
      <a id="testLink" href="javascript:void(0)" target="_blank" style="color: #6a8a6a; text-decoration: underline;">點擊此處在新標籤頁測試試算器</a>
    </div>
  </div>
</div>

<script>
function generateUrl() {
  const jsonInput = document.getElementById('jsonInput').value;
  const base64Output = document.getElementById('base64Output');
  const jsonError = document.getElementById('jsonError');

  jsonError.innerHTML = '';
  base64Output.value = '';

  try {
    const config = JSON.parse(jsonInput);

    // Validate required fields
    if (!config.n || !Array.isArray(config.f)) {
      throw new Error('缺少必需欄位：n (店家名稱) 和 f (分期公司陣列)');
    }

    if (config.f.length === 0) {
      throw new Error('分期公司陣列 f 不能為空');
    }

    config.f.forEach((fc, idx) => {
      if (!fc.n || !Array.isArray(fc.p)) {
        throw new Error(`分期公司 ${idx}: 缺少 n (名稱) 或 p (方案陣列)`);
      }
      if (fc.p.length === 0) {
        throw new Error(`分期公司 "${fc.n}": 方案陣列不能為空`);
      }
    });

    // Encode to base64
    const jsonStr = JSON.stringify(config);
    const encoded = btoa(unescape(encodeURIComponent(jsonStr)));
    base64Output.value = encoded;

    jsonError.innerHTML = '<span class="success">✓ JSON 有效，Base64 已生成</span>';
    buildFullUrl();
  } catch (e) {
    jsonError.innerHTML = `<span class="error">✗ 錯誤：${e.message}</span>`;
  }
}

function buildFullUrl() {
  const baseUrl = document.getElementById('baseUrl').value.trim();
  const base64 = document.getElementById('base64Output').value.trim();
  const fullUrlInput = document.getElementById('fullUrl');

  if (!base64) {
    fullUrlInput.value = '';
    return;
  }

  const fullUrl = `${baseUrl}#c=${base64}`;
  fullUrlInput.value = fullUrl;

  // Update test link
  const testLink = document.getElementById('testLink');
  testLink.href = fullUrl;
  testLink.textContent = `點擊此處在新標籤頁測試試算器 (${(fullUrl.length / 1024).toFixed(1)} KB)`;
}

function copyToClipboard(elementId) {
  const element = document.getElementById(elementId);
  if (!element.value) {
    alert('沒有內容可複製');
    return;
  }

  element.select();
  document.execCommand('copy');
  alert('已複製到剪貼簿');
}

function validateAndPreview() {
  const jsonInput = document.getElementById('jsonInput').value;
  const validateResult = document.getElementById('validateResult');

  validateResult.innerHTML = '';

  try {
    const config = JSON.parse(jsonInput);
    let html = '<div class="success" style="margin-top: 15px;">✓ 配置有效</div>';
    html += '<div style="background: #f8f2e8; padding: 15px; border-radius: 8px; margin-top: 15px; font-size: 13px;">';
    html += `<strong>店家名稱：</strong> ${config.n}<br>`;
    html += `<strong>預設方案：</strong> ${config.t || 'general (一般專案)'}<br>`;
    html += `<strong>分期公司數：</strong> ${config.f.length}<br>`;
    html += '<strong>方案明細：</strong><br><ul style="margin: 10px 0; padding-left: 20px;">';

    config.f.forEach((fc, idx) => {
      const planCount = fc.p ? fc.p.length : 0;
      html += `<li>${fc.n}: ${planCount} 期</li>`;
    });

    html += '</ul></div>';
    validateResult.innerHTML = html;
  } catch (e) {
    validateResult.innerHTML = `<span class="error" style="margin-top: 15px;">✗ JSON 無效：${e.message}</span>`;
  }
}

// 初始化
document.getElementById('jsonInput').addEventListener('change', generateUrl);
document.getElementById('baseUrl').addEventListener('change', buildFullUrl);
</script>

</body>
</html>
